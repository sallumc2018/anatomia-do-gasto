name: Check README Sections

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Verify README AUTO sections are up to date
        run: python tools/dev/regenerar_readme.py --check
