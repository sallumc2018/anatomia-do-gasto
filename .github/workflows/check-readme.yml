name: Check README Sections

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify README AUTO sections are up to date
        run: python tools/dev/regenerar_readme.py --check
