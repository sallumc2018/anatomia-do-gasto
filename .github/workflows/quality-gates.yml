name: Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-governance:
    name: Python, scope, publication and review gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Memory validation
        run: python tools/agents/validate-area.py --area memory

      - name: Agent contract validation
        run: python tools/agents/validate-area.py --area agents

      - name: Scope gates
        run: python tools/agents/validate-area.py --area scope

      - name: Publication gates
        run: python tools/agents/validate-area.py --area publication

      - name: Peer review readiness
        run: python tools/agents/validate-area.py --area review

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
